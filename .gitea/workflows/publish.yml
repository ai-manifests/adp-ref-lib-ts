name: Build and Publish npm Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: linux
    steps:
      - name: Checkout
        run: |
          git clone "${{ github.server_url }}/${{ github.repository }}.git" .
          git checkout ${{ github.sha }}

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure Gitea npm auth
        run: |
          cat > ~/.npmrc <<EOF
          //git.marketally.com/api/packages/ai-manifests/npm/:_authToken=${{ secrets.GITEATOKEN }}
          EOF

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build TypeScript
        run: npm run build

      - name: Publish adp-manifest to Gitea npm
        run: |
          npm publish \
            --registry=https://git.marketally.com/api/packages/ai-manifests/npm/ \
            --access public
